<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    :root {
      --color-primary: #667eea;
      --color-primary-hover: #5a67d8;
      --color-success: #48bb78;
      --color-danger: #e53e3e;
      --color-danger-bg: #fff5f5;
      --color-danger-border: #feb2b2;
      --color-text: #2d3748;
      --color-text-muted: #718096;
      --color-text-done: #a0aec0;
      --color-border: #e2e8f0;
      --color-border-light: #f7fafc;
      --color-bg: #f0f4f8;
      --color-surface: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--color-bg);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: var(--color-surface);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--color-text);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid var(--color-border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: var(--color-text);
    }

    .input-row input:focus {
      border-color: var(--color-primary);
    }

    .input-row button {
      padding: 12px 18px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: var(--color-primary-hover);
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .stats {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 14px;
    }

    .stats span {
      color: var(--color-primary);
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid var(--color-border-light);
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: var(--color-border-light);
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: var(--color-text-done);
    }

    .check-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.8rem;
      color: #fff;
    }

    li.checked .check-btn {
      background: var(--color-success);
      border-color: var(--color-success);
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: var(--color-text);
      cursor: pointer;
      user-select: none;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: var(--color-danger);
      background: var(--color-danger-bg);
    }

    .empty {
      text-align: center;
      color: var(--color-text-done);
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      color: var(--color-text-done);
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .clear-btn:hover {
      color: var(--color-danger);
      border-color: var(--color-danger-border);
      background: var(--color-danger-bg);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="60"
             aria-label="새 아이템 이름">
      <button id="addBtn">추가</button>
    </div>

    <div class="stats" id="stats" aria-live="polite"></div>

    <ul id="list" aria-label="쇼핑 목록"></ul>

    <p class="empty" id="empty" role="status">아직 아이템이 없습니다.</p>

    <button class="clear-btn" id="clearBtn" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script>
    const STORAGE_KEY = 'shopping-list';

    function loadItems() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    let items = loadItems();

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function createItemEl(item, idx) {
      const li = document.createElement('li');
      if (item.done) li.classList.add('checked');

      const checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn';
      checkBtn.setAttribute('aria-label', item.done ? '완료 취소' : '완료 표시');
      checkBtn.setAttribute('aria-pressed', String(item.done));
      checkBtn.dataset.action = 'toggle';
      checkBtn.dataset.idx = idx;
      if (item.done) checkBtn.textContent = '✓';

      const textSpan = document.createElement('span');
      textSpan.className = 'item-text';
      textSpan.textContent = item.text;
      textSpan.dataset.action = 'toggle';
      textSpan.dataset.idx = idx;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.setAttribute('aria-label', `${item.text} 삭제`);
      deleteBtn.dataset.action = 'delete';
      deleteBtn.dataset.idx = idx;
      deleteBtn.textContent = '✕';

      li.append(checkBtn, textSpan, deleteBtn);
      return li;
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const checkedCount = items.filter(i => i.done).length;
      stats.innerHTML = `총 <span>${items.length}</span>개 · 완료 <span>${checkedCount}</span>개`;
      clearBtn.style.display = checkedCount > 0 ? 'block' : 'none';

      const fragment = document.createDocumentFragment();
      items.forEach((item, idx) => fragment.appendChild(createItemEl(item, idx)));
      list.appendChild(fragment);
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    document.getElementById('list').addEventListener('click', e => {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      const idx = Number(target.dataset.idx);
      if (target.dataset.action === 'toggle') toggle(idx);
      else if (target.dataset.action === 'delete') remove(idx);
    });

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
