<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    :root {
      --color-primary: #667eea;
      --color-primary-hover: #5a67d8;
      --color-success: #48bb78;
      --color-danger: #e53e3e;
      --color-danger-bg: #fff5f5;
      --color-danger-border: #feb2b2;
      --color-text: #2d3748;
      --color-text-muted: #718096;
      --color-text-done: #a0aec0;
      --color-border: #e2e8f0;
      --color-border-light: #f7fafc;
      --color-bg: #f0f4f8;
      --color-surface: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--color-bg);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: var(--color-surface);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--color-text);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid var(--color-border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: var(--color-text);
    }

    .input-row input:focus {
      border-color: var(--color-primary);
    }

    .input-row button {
      padding: 12px 18px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: var(--color-primary-hover);
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .input-row button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .stats {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 14px;
    }

    .stats span {
      color: var(--color-primary);
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid var(--color-border-light);
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: var(--color-border-light);
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: var(--color-text-done);
    }

    .check-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.8rem;
      color: #fff;
    }

    li.checked .check-btn {
      background: var(--color-success);
      border-color: var(--color-success);
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: var(--color-text);
      cursor: pointer;
      user-select: none;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: var(--color-danger);
      background: var(--color-danger-bg);
    }

    .empty {
      text-align: center;
      color: var(--color-text-done);
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      color: var(--color-text-done);
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .clear-btn:hover {
      color: var(--color-danger);
      border-color: var(--color-danger-border);
      background: var(--color-danger-bg);
    }

    .loading {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .error-msg {
      background: var(--color-danger-bg);
      border: 1px solid var(--color-danger-border);
      color: var(--color-danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="60"
             aria-label="새 아이템 이름">
      <button id="addBtn">추가</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="stats" id="stats" aria-live="polite"></div>

    <div class="loading" id="loading">불러오는 중...</div>
    <ul id="list" aria-label="쇼핑 목록"></ul>

    <p class="empty" id="empty" role="status" style="display:none">아직 아이템이 없습니다.</p>

    <button class="clear-btn" id="clearBtn" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://zznfoaxipqjjyovavrab.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vEOQZ_CXlW08FSO0XXdanA_LzAKhBUS';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    function createItemEl(item) {
      const li = document.createElement('li');
      if (item.done) li.classList.add('checked');

      const checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn';
      checkBtn.setAttribute('aria-label', item.done ? '완료 취소' : '완료 표시');
      checkBtn.setAttribute('aria-pressed', String(item.done));
      checkBtn.dataset.action = 'toggle';
      checkBtn.dataset.id = item.id;
      if (item.done) checkBtn.textContent = '✓';

      const textSpan = document.createElement('span');
      textSpan.className = 'item-text';
      textSpan.textContent = item.text;
      textSpan.dataset.action = 'toggle';
      textSpan.dataset.id = item.id;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.setAttribute('aria-label', `${item.text} 삭제`);
      deleteBtn.dataset.action = 'delete';
      deleteBtn.dataset.id = item.id;
      deleteBtn.textContent = '✕';

      li.append(checkBtn, textSpan, deleteBtn);
      return li;
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');
      const loading = document.getElementById('loading');

      loading.style.display = 'none';
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const checkedCount = items.filter(i => i.done).length;
      stats.innerHTML = `총 <span>${items.length}</span>개 · 완료 <span>${checkedCount}</span>개`;
      clearBtn.style.display = checkedCount > 0 ? 'block' : 'none';

      const fragment = document.createDocumentFragment();
      items.forEach(item => fragment.appendChild(createItemEl(item)));
      list.appendChild(fragment);
    }

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        showError('데이터를 불러오지 못했습니다.');
        document.getElementById('loading').style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      const addBtn = document.getElementById('addBtn');
      addBtn.disabled = true;

      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      addBtn.disabled = false;

      if (error) {
        showError('아이템 추가에 실패했습니다.');
        return;
      }

      items.unshift(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await supabase
        .from('shopping_items')
        .update({ done: !item.done })
        .eq('id', id);

      if (error) {
        showError('상태 변경에 실패했습니다.');
        return;
      }

      item.done = !item.done;
      render();
    }

    async function remove(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제에 실패했습니다.');
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.done).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        showError('완료 항목 삭제에 실패했습니다.');
        return;
      }

      items = items.filter(i => !i.done);
      render();
    }

    document.getElementById('list').addEventListener('click', e => {
      const target = e.target.closest('[data-action]');
      if (!target) return;
      const id = target.dataset.id;
      if (target.dataset.action === 'toggle') toggle(id);
      else if (target.dataset.action === 'delete') remove(id);
    });

    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
